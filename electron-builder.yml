appId: com.luisf.ai-usage-dashboard
productName: AI Usage Dashboard
copyright: "© 2026 Luis"

directories:
  output: release
  buildResources: build

files:
  - dist-main/**/*
  - dist-renderer/**/*
  - package.json
  - "!node_modules/chrome-cookies-secure/**"
  - "!node_modules/win-dpapi/**"
  - "!node_modules/sqlite3/**"

asar: true
npmRebuild: false
electronUpdaterCompatibility: ">=2.16"

win:
  target:
    - target: dir
      arch: [x64]
  icon: build/icon.ico
  signAndEditExecutable: false

extraMetadata:
  main: dist-main/index.js
